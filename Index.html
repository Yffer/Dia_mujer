<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Planeta con Fotos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
flex-direction:column;
}

/* TITULO MEJORADO */
.titulo{
position:absolute;
top:80px;
width:100%;
text-align:center;

font-family:'Playfair Display',serif;
font-size:34px;
letter-spacing:2px;

color:#ffffff;

text-shadow:
0 0 8px rgba(255,255,255,0.8),
0 0 18px rgba(255,120,200,0.6),
0 0 35px rgba(255,120,200,0.4);

padding:10px 20px;

}

/* CONTENEDOR */
.sistema{
position:relative;
width:360px;
height:360px;
transform-style:preserve-3d;
perspective:900px;
}

/* PLANETA */
.planeta{
position:absolute;
top:50%;
left:50%;
width:180px;
height:180px;
transform:translate(-50%,-50%);
border-radius:50%;
background:url("planeta.jpg") center/cover;

box-shadow:
inset -30px -30px 50px rgba(0,0,0,0.6),
inset 30px 30px 50px rgba(255,255,255,0.25),
0 0 35px rgba(0,150,255,0.7),
0 0 80px rgba(0,150,255,0.4);
}

/* ORBITA */
.orbita{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
animation:girar 20s linear infinite;
}

/* FOTOS */
.foto{
position:absolute;
top:50%;
left:50%;
width:90px;
height:90px;
margin:-45px;
border-radius:20px;
overflow:hidden;
cursor:pointer;

box-shadow:
0 10px 25px rgba(0,0,0,0.8),
0 0 10px rgba(255,255,255,0.4);

transition:transform .4s;
}

.foto img{
width:100%;
height:100%;
object-fit:cover;
}

/* POSICIONES */
.f1{ transform:rotateY(0deg) translateZ(150px); }
.f2{ transform:rotateY(60deg) translateZ(150px); }
.f3{ transform:rotateY(120deg) translateZ(150px); }
.f4{ transform:rotateY(180deg) translateZ(150px); }
.f5{ transform:rotateY(240deg) translateZ(150px); }
.f6{ transform:rotateY(300deg) translateZ(150px); }

/* AGRANDAR FOTO */
.f1.activa{ transform:rotateY(0deg) translateZ(150px) scale(1.4); }
.f2.activa{ transform:rotateY(60deg) translateZ(150px) scale(1.4); }
.f3.activa{ transform:rotateY(120deg) translateZ(150px) scale(1.4); }
.f4.activa{ transform:rotateY(180deg) translateZ(150px) scale(1.4); }
.f5.activa{ transform:rotateY(240deg) translateZ(150px) scale(1.4); }
.f6.activa{ transform:rotateY(300deg) translateZ(150px) scale(1.4); }

/* ESTRELLAS */
.estrella{
position:absolute;
top:50%;
left:50%;
width:3px;
height:3px;
background:white;
border-radius:50%;

box-shadow:
0 0 5px white,
0 0 10px #8fd3ff,
0 0 15px #8fd3ff;

transform-style:preserve-3d;
animation:orbitar 12s linear infinite;
}

@keyframes orbitar{
0%{transform:rotateY(0deg) translateZ(200px);}
100%{transform:rotateY(360deg) translateZ(200px);}
}

/* PARTICULAS 3D */
.particula3d{
position:absolute;
top:50%;
left:50%;
width:2px;
height:2px;
background:white;
border-radius:50%;

box-shadow:
0 0 4px white,
0 0 8px #8fd3ff,
0 0 12px #8fd3ff;

transform-style:preserve-3d;
animation:movimiento3d linear infinite;
}

@keyframes movimiento3d{

0%{transform:translate3d(0,0,-300px) rotateY(0deg);}

50%{
transform:
translate3d(
calc(-200px + 400px * var(--x)),
calc(-200px + 400px * var(--y)),
0px)
rotateY(180deg);
}

100%{
transform:
translate3d(
calc(-200px + 400px * var(--x)),
calc(-200px + 400px * var(--y)),
300px)
rotateY(360deg);
}

}

/* BOTON */
.boton{
margin-top:40px;
padding:12px 35px;
font-size:18px;
letter-spacing:2px;
border:none;
border-radius:30px;
cursor:pointer;

color:white;
background:linear-gradient(45deg,#ff4da6,#8fd3ff);

box-shadow:
0 0 10px #ff4da6,
0 0 20px #8fd3ff;

transition:.3s;
}

.boton:hover{
transform:scale(1.1);
}

@keyframes girar{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

</style>
</head>

<body>

<div class="titulo">
Para la mujer más bonita del mundo
</div>

<div class="sistema">

<div class="planeta"></div>

<div class="orbita">

<div class="foto f1"><img src="foto1.jpg"></div>
<div class="foto f2"><img src="foto2.jpg"></div>
<div class="foto f3"><img src="foto3.jpg"></div>
<div class="foto f4"><img src="foto4.jpg"></div>
<div class="foto f5"><img src="foto5.jpg"></div>
<div class="foto f6"><img src="foto6.jpg"></div>

</div>

</div>

<button class="boton" onclick="location.href='pagina2.html'">
Entrar
</button>

<script>

const fotos=document.querySelectorAll(".foto");
const sistema=document.querySelector(".sistema");

function crearEstrella(){

let estrella=document.createElement("div");
estrella.className="estrella";

let angulo=Math.random()*360;

estrella.style.transform=`rotateY(${angulo}deg) translateZ(${150+Math.random()*120}px)`;

sistema.appendChild(estrella);

}

function crearParticula3D(){

let p=document.createElement("div");
p.className="particula3d";

p.style.setProperty("--x",Math.random());
p.style.setProperty("--y",Math.random());

p.style.animationDuration=(8+Math.random()*10)+"s";

sistema.appendChild(p);

}

for(let i=0;i<40;i++){
crearEstrella();
}

for(let i=0;i<70;i++){
crearParticula3D();
}

fotos.forEach(foto=>{

foto.onclick=()=>{

foto.classList.add("activa");

setTimeout(()=>{
foto.classList.remove("activa");
},900);

for(let i=0;i<15;i++){
crearEstrella();
}

for(let i=0;i<10;i++){
crearParticula3D();
}

}

});

</script>

</body>
</html>
