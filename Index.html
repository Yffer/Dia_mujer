<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Ti ❤️</title>

<style>

body{
margin:0;
background:#0a0a0a;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h1{
margin-bottom:15px;
}

#puzzle{
width:300px;
height:300px;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:3px;
background:#222;
padding:3px;
border-radius:10px;
}

.cell{
background:#111;
border-radius:5px;
}

#pieces{
margin-top:25px;
display:grid;
grid-template-columns:repeat(3,90px);
gap:10px;
}

.piece{
width:90px;
height:90px;
background-image:url("foto.jpg");
background-size:300px 300px;
border-radius:6px;
touch-action:none;
}

#message{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
font-size:24px;
opacity:0;
transition:1s;
}

#message.show{
opacity:1;
}

</style>
</head>

<body>

<h1>Arma nuestro recuerdo ❤️</h1>

<div id="puzzle"></div>
<div id="pieces"></div>

<div id="message">
<h2>Feliz Día de la Mujer 💐</h2>
<p>Eres la pieza más hermosa de mi vida ❤️</p>
</div>

<script>

const puzzle=document.getElementById("puzzle")
const piecesContainer=document.getElementById("pieces")
const message=document.getElementById("message")

let size=3

let dragPiece=null
let offsetX=0
let offsetY=0
let originalParent=null

/* tablero */

for(let i=0;i<size*size;i++){

let cell=document.createElement("div")
cell.className="cell"
cell.dataset.index=i

puzzle.appendChild(cell)

}

/* piezas */

let order=[0,1,2,3,4,5,6,7,8]
order.sort(()=>Math.random()-0.5)

order.forEach(i=>{

let p=document.createElement("div")

p.className="piece"
p.dataset.index=i

let x=i%size
let y=Math.floor(i/size)

p.style.backgroundPosition=`${-x*100}px ${-y*100}px`

piecesContainer.appendChild(p)

p.addEventListener("touchstart",startDrag,{passive:false})
p.addEventListener("touchmove",moveDrag,{passive:false})
p.addEventListener("touchend",endDrag)

})

function startDrag(e){

e.preventDefault()

dragPiece=e.target
originalParent=dragPiece.parentElement

const touch=e.touches[0]

const rect=dragPiece.getBoundingClientRect()

offsetX=touch.clientX-rect.left
offsetY=touch.clientY-rect.top

dragPiece.style.position="fixed"
dragPiece.style.zIndex="1000"

}

function moveDrag(e){

if(!dragPiece) return

e.preventDefault()

const touch=e.touches[0]

dragPiece.style.left=(touch.clientX-offsetX)+"px"
dragPiece.style.top=(touch.clientY-offsetY)+"px"

}

function endDrag(e){

if(!dragPiece) return

const touch=e.changedTouches[0]

dragPiece.style.position=""
dragPiece.style.left=""
dragPiece.style.top=""

let element=document.elementFromPoint(touch.clientX,touch.clientY)

if(element && element.classList.contains("cell")){

if(dragPiece.dataset.index===element.dataset.index){

element.appendChild(dragPiece)

}else{

originalParent.appendChild(dragPiece)

}

}else{

originalParent.appendChild(dragPiece)

}

dragPiece=null

checkPuzzle()

}

function checkPuzzle(){

let correct=true

document.querySelectorAll(".cell").forEach(cell=>{

let p=cell.firstChild

if(!p || p.dataset.index!=cell.dataset.index){

correct=false

}

})

if(correct){

setTimeout(()=>{

message.classList.add("show")

},500)

}

}

</script>

</body>
</html>
